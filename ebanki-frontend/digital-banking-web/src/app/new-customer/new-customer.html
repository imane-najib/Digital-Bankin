<div class="container">
  <div class="card col-md-5 offset-3 mt-2">
      <div class="card-header"> New Customer</div>
      <div class="card-body">
        <form [formGroup]="newCustomerFormGroup" (ngSubmit)="hundleSaveCustomer()">
            <div class="mb-3">
                <label class="form-label">Name:</label>
                <input type="text" formControlName="Name" class="form-control">
                 <span  class="text-danger"
                   *ngIf="newCustomerFormGroup.controls['Name'].touched
                   && newCustomerFormGroup.controls['Name'].errors
                   && newCustomerFormGroup.controls['Name'].errors!['required']">
                        Name is required
                 </span>
            </div>
          <div class="mb-3">
            <label class="form-label">Email:</label>
            <input type="text" formControlName="email" class="form-control">
            <span  class="text-danger"
                   *ngIf="newCustomerFormGroup.controls['email'].touched
                   && newCustomerFormGroup.controls['email'].errors
                   && newCustomerFormGroup.controls['email'].errors!['email']">
                        Email is required
            </span>
          </div>
          <button [disabled]="!newCustomerFormGroup.valid" class="btn btn-info">Save</button>
        </form>
      </div>
  </div>
</div>
