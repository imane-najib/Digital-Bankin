<div class="container mt-2">
  <ng-container *ngIf="customers | async as listCustomers;else failureOrLoading"></ng-container>
        <div class="card" *ngIf="customers">

          <div class="card-header">Customers</div>
          <div class="card-body">
            <div *ngIf="searchFormGroup">
                <form [formGroup] ="searchFormGroup" (ngSubmit)="hundleSearchCustomers()">
                  <div class="input-group">
                    <label class="input-group-text">Keyword : </label>
                    <input type="text" formControlName="keyword" class="form-control">
                    <button class="btn btn-info">
                       <i class="bi bi-search"></i>
                    </button>
                  </div>
                </form>
            </div>

            <table class="table">
              <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
              </tr>
              </thead>
              <tbody>
              <tr *ngFor="let c of customers | async">
                <td>{{c.id}}</td>
                <td>{{c.Name}}</td>
                <td>{{c.email}}</td>
                <td>
                    <button (click)="hundleDeleteCustomer(c)" class="btn btn-danger">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
              </tr>
              </tbody>
            </table>

          </div>
        </div>
  <ng-template #failureOrLoading>
    <ng-container *ngIf="errorMessage; else Loading">
        <div class="text-danger">
          {{errorMessage}}
        </div>
    </ng-container>
     <ng-template #Loading>
       Loading .....
     </ng-template>

  </ng-template>

</div>
